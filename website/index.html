<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>###REPLACE_ME_SITE_NAME### - /</title>
    <link href="/pfb_for_s3/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/pfb_for_s3/css/bootstrap.min.css" rel="stylesheet">
    <link href="/pfb_for_s3/css/main.css" rel="stylesheet">
    <meta name="description" content="File Browser - ###REPLACE_ME_SITE_NAME###">
    <meta name="robots" content="index, follow" />


    <link rel="apple-touch-icon" sizes="180x180" href="/icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/pfb_for_s3/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/pfb_for_s3/icon/favicon-16x16.png">
    <link rel="manifest" href="/pfb_for_s3/icon/site.webmanifest">
    <link rel="mask-icon" href="/pfb_for_s3/icon/safari-pinned-tab.svg" color="#ff9900">
    <link rel="shortcut icon" href="/pfb_for_s3/icon/favicon.ico">
    <meta name="msapplication-TileColor" content="#ff9900">
    <meta name="msapplication-config" content="/pfb_for_s3/icon/browserconfig.xml">
    <meta name="theme-color" content="#ff9900">
</head>
<body>
<div class="container-xxl mt-3">
    <h4 class="text-secondary mb-0" id="site_title">###REPLACE_ME_SITE_NAME###</h4>
    <h1 class="mb-2" id="site_current_path">&nbsp;</h1>

    <div class="d-flex align-items-center gap-2 mb-3" id="gallery_toolbar">
        <i class="bi bi-image" style="font-size: 14px;" aria-hidden="true"></i>
        <input type="range" id="tileSizeSlider" class="form-range" min="90" max="260" value="140" aria-label="Thumbnail size">
        <i class="bi bi-image" style="font-size: 24px;" aria-hidden="true"></i>
        <div id="auth_status" class="ms-auto small"></div>
    </div>

    <div id="listing" class="gallery_grid"></div>
    <div id="bottom_nav">
        <div class="d-inline-block align-top align-top pt-1 ps-2" id="colors_word_close">Powered by <a href="https://github.com/earlonipa/public-file-browser-for-amazon-s3">Public File Browser for Amazon S3</a></div>
    </div>

    <div class="modal fade" id="mediaGalleryModal" tabindex="-1" aria-hidden="true" aria-labelledby="mediaGalleryCaption">
        <div class="modal-dialog modal-dialog-centered gallery_dialog_dynamic">
            <div class="modal-content bg-dark">
                <div class="modal-header border-0 py-2">
                    <span class="text-light small text-truncate" id="mediaGalleryCaption"></span>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center position-relative" id="mediaGalleryBody">
                    <button type="button" class="btn btn-light gallery_nav gallery_nav_prev" id="mediaGalleryPrev" aria-label="Previous">&#10094;</button>
                    <div id="mediaGalleryContent"></div>
                    <button type="button" class="btn btn-light gallery_nav gallery_nav_next" id="mediaGalleryNext" aria-label="Next">&#10095;</button>
                </div>
            </div>
        </div>
    </div>

    <div id="thumbHoverPreview" aria-hidden="true"></div>

    <script src="/pfb_for_s3/js/bootstrap.bundle.min.js"></script>
    <script src="/pfb_for_s3/js/jquery-3.7.1.min.js"></script>
    <script src="/pfb_for_s3/js/luxon.min.js"></script>
    <script src="/pfb_for_s3/js/aws-sdk-js-v2.1560.0.min.js"></script><!-- nosemgrep: missing-integrity -->
    <script type="text/javascript">
        let awsConfigOptions = {
            // site_name - Used in the #site_title header, and in the <title>. Be sure and change
            //             this below, and both places above.
            // files_open_in_new_tab - How should the browser react when a user clicks a file in
            //                         the interface? “true” is recommended.
            //                         true - Open in a new tab
            //                         false - Open in the same tab
            // visible_storage_classes - Comma delimited list of storage classes to show. Recommend
            //                           keeping this default. See AWS S3 API Docs for values.
            // identity_pool_id - Shouldn't need to change, but used to identify the Cognito pool
            //                    for temporary credentials.
            // user_pool_id / user_pool_client_id - From the FileManagerUserPoolId /
            //                    FileManagerUserPoolClientId CloudFormation stack outputs. Required
            //                    for the login page / upload feature; leave blank to disable login.
            // bucket_name - Shouldn't need to change, but used to identify the source bucket during
            //               the list generation
            site_name: "###REPLACE_ME_SITE_NAME###",
            files_open_in_new_tab: ###REPLACE_ME_FILES_OPEN_MODE###,
            visible_storage_classes: "###REPLACE_ME_VISIBLE_STORAGE_CLASSES###",
            identity_pool_id: "###REPLACE_ME_IDENTITY_POOL_ID###",
            user_pool_id: "###REPLACE_ME_USER_POOL_ID###",
            user_pool_client_id: "###REPLACE_ME_USER_POOL_CLIENT_ID###",
            bucket_name: "###REPLACE_ME_BUCKET_NAME###"
        }
    </script>
    <script src="/pfb_for_s3/js/auth.js"></script>
    <script src="/pfb_for_s3/js/main.js"></script>
</div>
</body>
</html>
